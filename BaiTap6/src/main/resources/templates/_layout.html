<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Bai 6 - QLSP Spring Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
        <div style="padding-left: 20px">
            <a class="navbar-brand" th:href="@{/products}">Home</a>
            <a class="navbar-brand" th:href="@{/products}">Products</a>
        </div>
        <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
            <span class="text-light me-3">Xin chào, <b sec:authentication="name">User</b>
                (<span sec:authentication="principal.authorities">ROLE</span>)
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div layout:fragment="content" class="container body-content mt-3">
</div>
<div class="card-footer text-center">
    <hr/>
    <p>&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</div>
</body>
</html>
