<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dang Ky Tai Khoan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { max-width: 450px; width: 100%; border: none; border-radius: 16px; box-shadow: 0 8px 35px rgba(0,0,0,.2); }
    </style>
</head>
<body>
<div class="container">
    <div class="card register-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill" style="font-size:3rem;color:#667eea"></i>
                <h3 class="mt-2 fw-bold">Tao Tai Khoan</h3>
                <p class="text-muted">Dang ky de bat dau hoc</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Nhap username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="Nhap email" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Nhap password" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-semibold">
                    <i class="bi bi-person-plus"></i> Dang Ky
                </button>
            </form>

            <div class="text-center">
                <span class="text-muted">Da co tai khoan?</span>
                <a th:href="@{/login}" class="fw-semibold">Dang nhap</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
