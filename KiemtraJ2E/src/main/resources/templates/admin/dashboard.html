<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin}"><i class="bi bi-speedometer2"></i> Admin Panel</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/courses}">Quan Ly Khoa Hoc</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="bi bi-house"></i> Trang chu</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Dang xuat</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-speedometer2"></i> Dashboard</h2>
    <div class="row g-4">
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-primary h-100">
                <div class="card-body text-center">
                    <i class="bi bi-book" style="font-size:2rem"></i>
                    <h3 class="mt-2" th:text="${courseCount}">0</h3>
                    <p class="mb-0">Khoa hoc</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-success h-100">
                <div class="card-body text-center">
                    <i class="bi bi-people" style="font-size:2rem"></i>
                    <h3 class="mt-2" th:text="${studentCount}">0</h3>
                    <p class="mb-0">Sinh vien</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-warning h-100">
                <div class="card-body text-center">
                    <i class="bi bi-tags" style="font-size:2rem"></i>
                    <h3 class="mt-2" th:text="${categoryCount}">0</h3>
                    <p class="mb-0">Danh muc</p>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card text-bg-info h-100">
                <div class="card-body text-center">
                    <i class="bi bi-card-checklist" style="font-size:2rem"></i>
                    <h3 class="mt-2" th:text="${enrollmentCount}">0</h3>
                    <p class="mb-0">Dang ky</p>
                </div>
            </div>
        </div>
    </div>
    <div class="card mt-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Khoa hoc gan day</h5>
            <a th:href="@{/admin/courses/create}" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg"></i> Them moi</a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr><th>#</th><th>Ten</th><th>Tin chi</th><th>Giang vien</th><th>Danh muc</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, i : ${recentCourses}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.credits}"></td>
                        <td th:text="${c.lecturer}"></td>
                        <td th:text="${c.category?.name}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- end container -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
