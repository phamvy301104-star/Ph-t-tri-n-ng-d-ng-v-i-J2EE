<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quan Ly Khoa Hoc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin}"><i class="bi bi-speedometer2"></i> Admin Panel</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/courses}">Quan Ly Khoa Hoc</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="bi bi-house"></i> Trang chu</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> Dang xuat</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-book"></i> Quan Ly Khoa Hoc</h2>
        <a th:href="@{/admin/courses/create}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Them Khoa Hoc</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr><th>#</th><th>Hinh anh</th><th>Ten khoa hoc</th><th>Tin chi</th><th>Giang vien</th><th>Danh muc</th><th class="text-center">Thao tac</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, i : ${courses}">
                        <td th:text="${i.count}"></td>
                        <td><img th:src="@{${c.image}}" alt="" style="width:60px;height:40px;object-fit:cover;border-radius:4px" th:if="${c.image}"></td>
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.credits}"></td>
                        <td th:text="${c.lecturer}"></td>
                        <td th:text="${c.category?.name}"></td>
                        <td class="text-center">
                            <a th:href="@{/admin/courses/edit/{id}(id=${c.id})}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                            <a th:href="@{/admin/courses/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Xoa khoa hoc nay?')"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="7" class="text-center text-muted py-4">Chua co khoa hoc nao</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
