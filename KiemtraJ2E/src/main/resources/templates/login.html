<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dang Nhap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 420px; width: 100%; border: none; border-radius: 16px; box-shadow: 0 8px 35px rgba(0,0,0,.2); }
        .btn-google { background: #fff; color: #444; border: 1px solid #ddd; }
        .btn-google:hover { background: #f8f8f8; }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill" style="font-size:3rem;color:#667eea"></i>
                <h3 class="mt-2 fw-bold">Dang Nhap</h3>
                <p class="text-muted">He thong dang ky hoc phan</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Ten dang nhap</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Nhap username" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mat khau</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Nhap password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-semibold">
                    <i class="bi bi-box-arrow-in-right"></i> Dang Nhap
                </button>
            </form>

            <div class="text-center my-3">
                <span class="text-muted">— hoac —</span>
            </div>
            <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 py-2 mb-3">
                <svg width="18" height="18" viewBox="0 0 48 48" class="me-2" style="vertical-align:middle">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Dang nhap bang Google
            </a>

            <div class="text-center mt-3">
                <span class="text-muted">Chua co tai khoan?</span>
                <a th:href="@{/register}" class="fw-semibold">Dang ky ngay</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
