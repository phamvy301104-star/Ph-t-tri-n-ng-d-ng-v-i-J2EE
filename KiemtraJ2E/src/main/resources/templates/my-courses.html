<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoc Phan Cua Toi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .navbar { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
        .course-img { height: 180px; object-fit: cover; }
        footer { background: #1a1a2e; color: #a0a0b0; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-mortarboard-fill me-2"></i>CourseApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="bi bi-house-door"></i> Trang Chu</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/my-courses}"><i class="bi bi-bookmark-check"></i> Hoc Phan Cua Toi</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}"><i class="bi bi-gear"></i> Quan Tri</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <span class="nav-link text-light"><i class="bi bi-person-circle"></i> <span sec:authentication="name">user</span></span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="nav-link btn btn-link text-light"><i class="bi bi-box-arrow-right"></i> Thoat</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h2 class="mb-4 fw-bold"><i class="bi bi-bookmark-check-fill"></i> Hoc Phan Cua Toi</h2>

    <div class="row g-4">
        <div class="col-sm-6 col-lg-4" th:each="en : ${enrollments}">
            <div class="card h-100">
                <img th:if="${en.course.image != null and !en.course.image.isEmpty()}"
                     th:src="${en.course.image.startsWith('http') ? en.course.image : en.course.image}"
                     class="card-img-top course-img" alt="">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${en.course.name}">Course</h5>
                    <p class="text-muted mb-1"><i class="bi bi-person-video3"></i> <span th:text="${en.course.lecturer}"></span></p>
                    <p class="text-muted mb-1"><i class="bi bi-star-fill text-warning"></i> <span th:text="${en.course.credits}"></span> tin chi</p>
                    <p class="text-muted mb-2"><i class="bi bi-calendar-event"></i> <span th:text="${#temporals.format(en.enrollDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                    <form th:action="@{/unenroll/{id}(id=${en.course.id})}" method="post" class="mt-auto">
                        <button class="btn btn-outline-danger w-100" onclick="return confirm('Ban co chac muon huy dang ky?')">
                            <i class="bi bi-x-circle"></i> Huy Dang Ky
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${enrollments.isEmpty()}" class="text-center py-5">
        <i class="bi bi-inbox" style="font-size:4rem;color:#ccc"></i>
        <p class="text-muted mt-3 fs-5">Ban chua dang ky hoc phan nao.</p>
        <a th:href="@{/home}" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Xem danh sach hoc phan</a>
    </div>
</div>

<footer class="text-center">
    <small>&copy; 2026 He Thong Dang Ky Hoc Phan</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
